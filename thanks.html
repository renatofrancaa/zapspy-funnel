<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access confirmed</title>
  <script src="./js/stubs.js"></script>
  <link rel="stylesheet" href="./css/fonts.css">
  <link rel="stylesheet" href="./css/global.css">
  <style>
    body{font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;margin:0}
    .card{background:#1e293b;border-radius:16px;padding:28px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.35)}
    h1{font-size:22px;margin:0 0 10px}
    p{color:#94a3b8;font-size:14px;line-height:1.5;margin:0 0 10px}
    code{background:#0f172a;padding:2px 8px;border-radius:6px;color:#6ee7b7}
    a.btn{display:inline-block;margin-top:14px;background:#00a884;color:#fff;text-decoration:none;font-weight:700;padding:12px 18px;border-radius:10px}
    a.btn.secondary{background:transparent;border:1px solid #334155;color:#e2e8f0;margin-left:8px}
  </style>
</head>
<body>
  <div class="card">
    <h1>You're in</h1>
    <p>Checkout handoff page. If you paid on Centerpag, keep the email from the receipt.</p>
    <p>Plan: <code id="plan">—</code></p>
    <p style="font-size:12px;color:#64748b">Member report dashboard comes in the next step. For now you can reopen the funnel or chats demo.</p>
    <a class="btn" href="./phone.html">Start again</a>
    <a class="btn secondary" href="./conversas.html">View chats</a>
  </div>
  <script>
    var p = new URLSearchParams(location.search);
    document.getElementById('plan').textContent = p.get('plan') || localStorage.getItem('selectedPlan') || 'complete';
  </script>
</body>
</html>
